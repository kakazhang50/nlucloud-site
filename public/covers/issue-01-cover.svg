<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" role="img" aria-labelledby="coverTitle coverDesc">
  <title id="coverTitle">Issue 01  Learning Architecture</title>
  <desc id="coverDesc">NLUCloud AI &amp; Society Review cover for July 2026</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#152921"/>
      <stop offset="55%" stop-color="#1E3A2F"/>
      <stop offset="100%" stop-color="#243D34"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A8895A"/>
      <stop offset="50%" stop-color="#C4A574"/>
      <stop offset="100%" stop-color="#A8895A"/>
    </linearGradient>
    <pattern id="weave" width="24" height="24" patternUnits="userSpaceOnUse" patternTransform="rotate(-12)">
      <line x1="0" y1="0" x2="0" y2="24" stroke="#F0E6D4" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="1200" fill="url(#bg)"/>
  <rect width="800" height="1200" fill="url(#weave)"/>

  <!-- Top rule -->
  <rect x="64" y="72" width="672" height="3" fill="url(#gold)"/>
  <rect x="64" y="76" width="672" height="1" fill="#F0E6D4" fill-opacity="0.15"/>

  <!-- Masthead -->
  <text x="400" y="118" text-anchor="middle" fill="#F0E6D4" fill-opacity="0.72"
        font-family="Georgia, 'Times New Roman', serif" font-size="13" letter-spacing="5.5">NLUCLOUD</text>
  <text x="400" y="142" text-anchor="middle" fill="#F0E6D4" fill-opacity="0.55"
        font-family="Georgia, 'Times New Roman', serif" font-size="11" letter-spacing="3.8">AI &amp; SOCIETY REVIEW</text>

  <!-- Issue folio -->
  <text x="400" y="196" text-anchor="middle" fill="#C4A574"
        font-family="'Courier New', monospace" font-size="12" letter-spacing="4.2">ISSUE 01 · JULY 2026</text>

  <!-- Orchestration motif  three layers -->
  <g opacity="0.85" filter="url(#softGlow)">
    <!-- Layer bands -->
    <rect x="120" y="248" width="560" height="88" rx="2" fill="#3D5C5C" fill-opacity="0.18" stroke="#C4A574" stroke-opacity="0.25" stroke-width="1"/>
    <rect x="120" y="368" width="560" height="88" rx="2" fill="#3D5C5C" fill-opacity="0.12" stroke="#C4A574" stroke-opacity="0.2" stroke-width="1"/>
    <rect x="120" y="488" width="560" height="88" rx="2" fill="#3D5C5C" fill-opacity="0.08" stroke="#C4A574" stroke-opacity="0.15" stroke-width="1"/>

    <!-- Connection lines -->
    <path d="M 200 336 L 200 368" stroke="#C4A574" stroke-opacity="0.5" stroke-width="1.5"/>
    <path d="M 400 336 L 400 368" stroke="#C4A574" stroke-opacity="0.65" stroke-width="1.5"/>
    <path d="M 600 336 L 600 368" stroke="#C4A574" stroke-opacity="0.5" stroke-width="1.5"/>
    <path d="M 280 456 L 280 488" stroke="#C4A574" stroke-opacity="0.45" stroke-width="1.5"/>
    <path d="M 520 456 L 520 488" stroke="#C4A574" stroke-opacity="0.45" stroke-width="1.5"/>
    <path d="M 200 336 L 400 368 L 600 336" fill="none" stroke="#C4A574" stroke-opacity="0.22" stroke-width="1"/>
    <path d="M 280 456 L 520 456" fill="none" stroke="#C4A574" stroke-opacity="0.18" stroke-width="1"/>

    <!-- Nodes -->
    <circle cx="200" cy="292" r="7" fill="#1E3A2F" stroke="#C4A574" stroke-width="1.5"/>
    <circle cx="400" cy="292" r="9" fill="#3D5C5C" stroke="#C4A574" stroke-width="2"/>
    <circle cx="600" cy="292" r="7" fill="#1E3A2F" stroke="#C4A574" stroke-width="1.5"/>
    <circle cx="280" cy="412" r="6" fill="#1E3A2F" stroke="#C4A574" stroke-width="1.5"/>
    <circle cx="520" cy="412" r="6" fill="#1E3A2F" stroke="#C4A574" stroke-width="1.5"/>
    <circle cx="360" cy="532" r="5" fill="#1E3A2F" stroke="#C4A574" stroke-width="1.5"/>
    <circle cx="440" cy="532" r="5" fill="#1E3A2F" stroke="#C4A574" stroke-width="1.5"/>

    <!-- Layer labels -->
    <text x="148" y="278" fill="#C4A574" fill-opacity="0.45" font-family="'Courier New', monospace" font-size="9" letter-spacing="2">MODEL</text>
    <text x="148" y="398" fill="#C4A574" fill-opacity="0.38" font-family="'Courier New', monospace" font-size="9" letter-spacing="2">SEQUENCE</text>
    <text x="148" y="518" fill="#C4A574" fill-opacity="0.32" font-family="'Courier New', monospace" font-size="9" letter-spacing="2">ORCHESTRATION</text>
  </g>

  <!-- Theme title -->
  <text x="400" y="660" text-anchor="middle" fill="#FAF6EF"
        font-family="Georgia, 'Times New Roman', serif" font-size="54" font-weight="600" letter-spacing="-1">Learning</text>
  <text x="400" y="728" text-anchor="middle" fill="#FAF6EF"
        font-family="Georgia, 'Times New Roman', serif" font-size="54" font-weight="600" font-style="italic" letter-spacing="-0.5">Architecture</text>

  <!-- Divider -->
  <line x1="320" y1="762" x2="480" y2="762" stroke="url(#gold)" stroke-width="2"/>

  <!-- Cover essay -->
  <text x="400" y="810" text-anchor="middle" fill="#F0E6D4" fill-opacity="0.88"
        font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="400">AI as an Orchestration</text>
  <text x="400" y="844" text-anchor="middle" fill="#F0E6D4" fill-opacity="0.88"
        font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="400">Layer in Education</text>

  <!-- Deck -->
  <text x="400" y="910" text-anchor="middle" fill="#F0E6D4" fill-opacity="0.5"
        font-family="Georgia, 'Times New Roman', serif" font-size="15" font-style="italic">
    <tspan x="400" dy="0">When information is abundant,</tspan>
    <tspan x="400" dy="24">orchestration becomes the constraint.</tspan>
  </text>

  <!-- Category -->
  <rect x="300" y="1000" width="200" height="28" rx="1" fill="none" stroke="#3D5C5C" stroke-width="1.5"/>
  <text x="400" y="1020" text-anchor="middle" fill="#3D5C5C" fill-opacity="0.9"
        font-family="'Courier New', monospace" font-size="10" letter-spacing="3.5">AI &amp; EDUCATION</text>

  <!-- Bottom -->
  <rect x="64" y="1100" width="672" height="1" fill="#F0E6D4" fill-opacity="0.12"/>
  <rect x="64" y="1104" width="672" height="2" fill="url(#gold)" fill-opacity="0.6"/>
  <text x="400" y="1142" text-anchor="middle" fill="#C4A574" fill-opacity="0.7"
        font-family="'Courier New', monospace" font-size="11" letter-spacing="4">NLUCLOUD PRESS</text>
  <text x="400" y="1168" text-anchor="middle" fill="#F0E6D4" fill-opacity="0.35"
        font-family="Georgia, serif" font-size="11" font-style="italic">nlucloud.com</text>
</svg>
