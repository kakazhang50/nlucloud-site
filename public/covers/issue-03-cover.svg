    <circle cx="400" cy="380" r="120" fill="none" stroke="#C4A574" stroke-opacity="0.12" stroke-width="1"/>
    <circle cx="400" cy="380" r="80" fill="none" stroke="#C4A574" stroke-opacity="0.2" stroke-width="1.5" stroke-dasharray="8 12"/>
