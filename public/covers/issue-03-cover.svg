  <text x="400" y="118" text-anchor="middle" fill="#F0E6D4" fill-opacity="0.72" font-family="Georgia, serif" font-size="13" letter-spacing="5.5">NLUCLOUD</text>
  <text x="400" y="142" text-anchor="middle" fill="#F0E6D4" fill-opacity="0.55" font-family="Georgia, serif" font-size="11" letter-spacing="3.8">AI &amp; SOCIETY REVIEW</text>
  <text x="400" y="196" text-anchor="middle" fill="#C4A574" font-family="monospace" font-size="12" letter-spacing="4.2">ISSUE 03 · MARCH 2026</text>
  
