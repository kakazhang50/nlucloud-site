    <line x1="380" y1="400" x2="420" y2="400" stroke="#C4A574" stroke-opacity="0.5" stroke-width="3" stroke-linecap="round"/>
    <line x1="400" y1="360" x2="400" y2="390" stroke="#C4A574" stroke-opacity="0.7" stroke-width="3" stroke-linecap="round"/>
